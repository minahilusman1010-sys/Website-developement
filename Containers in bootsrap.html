<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containers in bootstrap</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container border border-dark p-4 my-4">
        <h1>Editing videos</h1>
        <p>Its fun editing videos</p>
    </div>
    <div class="container p-5 mb-5 bg-primary  text white">
        <h1>Cooking</h1>
        <p>Its a good timepass</p>
    </div>
    <div class="container-fluid p-3 my-3 bg-danger text-black">
        <h1>Watching Tv or using phone</h1>
        <p>In my free time sometimes I use phone</p>
    </div>
    <div class="container p-3 my-3 bg-success">
        <h1>Studying</h1>
        <p>Its not a hobby but yet I do study</p>
    </div>
    
</body>
</html>
