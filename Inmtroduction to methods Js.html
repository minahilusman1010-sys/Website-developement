       <h2>Javascript String methods</h2> 
<p>Basic Methods</p>
<script>
var str = "AmaZIngG";

document.write("<br>");
document.write(str.toLowerCase());

document.write(str.startsWith('A'));

document.write("<br>");
 document.write(Math.floor(5.768));

</script>
