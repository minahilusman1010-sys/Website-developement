<!DOCTYPE html>

<head>

</head>
<body>
    <h2>Statements in Javascript</h2>
    <p>A <b>Javascript program</b>is a lit of <b>Statements</b>to be executed by a computer</p>
    <p id="statement"></p>
    <script>
        var x, y,z; // Statement 1
        x = 5; // statement 2
        y = 6; // statement 3
        z = x * y; //statement 4

        document.getElementById("statement").innerHTML = "The value of z is " + z + ".";
    </script>
    
</body>
