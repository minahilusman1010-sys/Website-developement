<html>
    <body>
        
        <script>
            //use of typeoff operater
            let name = "john";
            let num = 5;
            let x;
            document.write(typeof(name));
            document.write("<br>");
            document.write(typeof(num));
            document.write("<br>");
            document.write(typeof(x));
            document.write("<br>");

            //use of string()
            //string() is a method which changes your data type into string it concatenates
            let a = 4;
            let b = 5;
            document.write(a+b);
            document.write("<br>");
            document.write(String(a)+String(b)); //Do not add because it is a string it concatenates
            document.write("<br>")
            //use of search()
            let sentence = "HII!! do you know that what' in there??";
            document.write(sentence.search("in"));
            document.write("<br>");

        </script>
    </body>
</html>
