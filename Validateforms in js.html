<html>
    <head>
        <script>
            function validateForm() {
                var x = document.form["myform"]["fname"].value;
                if (x == "") {
                    alert("Name must be filled out");
                    return false;
                }
            }
        </script>
    </head>
    <body>
        
        <form name="myform" onsubmit-="return validateForm()">
            Name: <input type="text" name="fname">
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
